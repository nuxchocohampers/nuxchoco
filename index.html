  Object.assign(state, updates);
  render();

setInterval(() => setState({bannerIdx: (state.bannerIdx + 1) % 4}), 5000);

async function loadOrders() {
  setState({loading: true});
  const {data} = await sb.from("orders").select("*").order("created_at", {ascending: false});
  setState({orders: data || [], loading: false});
}

function cartTotal() { return state.cart.reduce((s,c) => s + c.price * c.qty, 0); }
function cartCount() { return state.cart.reduce((s,c) => s + c.qty, 0); }

function addToCart(item) {
  const ex = state.cart.find(c => c.id === item.id);
  const cart = ex
    ? state.cart.map(c => c.id === item.id ? {...c, qty: c.qty + 1} : c)
    : [...state.cart, {...item, qty: 1}];
  setState({cart, showCart: true});
}

function updateQty(id, qty) {
  if (qty < 1) { setState({cart: state.cart.filter(c => c.id !== id)}); return; }
  setState({cart: state.cart.map(c => c.id === id ? {...c, qty} : c)});
}

async function doRazorpay() {
  const f = state.form;
  if (!f.name || !f.phone || !f.addr) { alert("Name, phone aur address zaroori hai!"); return; }
  setState({paying: true});
  const options = {
    key: RZP_KEY,
    amount: cartTotal() * 100,
    currency: "INR",
    name: "Nuxchoco Hampers",
    description: "Premium Gift Hamper",
    handler: async function(response) {
      for (const item of state.cart) {
        await sb.from("orders").insert({
          name: f.name, phone: f.phone,
          address: f.addr + (f.city ? ", " + f.city : ""),
          city: f.city, hamper_name: item.name,
          category: item.cat, quantity: item.qty,
          total: item.price * item.qty,
          status: "New", note: f.note
        });
      }
      setState({cart: [], showCart: false, paying: false, page: "thankyou"});
    },
    prefill: {name: f.name, contact: f.phone},
    theme: {color: "#C9933A"},
    modal: {ondismiss: () => setState({paying: false})}
  };
  const rzp = new Razorpay(options);
  rzp.open();
}

async function updateStatus(id, status) {
  await sb.from("orders").update({status}).eq("id", id);
  setState({orders: state.orders.map(o => o.id === id ? {...o, status} : o)});
}

async function deleteOrder(id) {
  await sb.from("orders").delete().eq("id", id);
  setState({orders: state.orders.filter(o => o.id !== id)});

            <div style="display:flex;align-items:center;gap:8px;">
              <div class="logo-icon">🍫</div>
              <div><div style="font-size:13px;font-weight:700;">Nuxchoco Admin</div><div style="font-size:8px;color:#86868B;letter-spacing:1.5px;">ORDER DASHBOARD</div></div>
            </div>
            <div style="display:flex;gap:8px;">
              ${state.adminIn ? `<button class="btn-gold" style="border-radius:8px;padding:7px 14px;font-size:11px;" onclick="loadOrders()">Refresh</button>` : ""}
              <button style="background:none;color:#86868B;border:1px solid #E0E0E0;padding:7px 14px;font-size:11px;border-radius:8px;cursor:pointer;" onclick="setState({adminIn:false,page:'home'})">Logout</button>
            </div>
          </div>
        </nav>
        ${!state.adminIn ? `
          <div class="login-box">
            <div class="login-card">
              <div class="login-icon">🍫</div>
              <div class="login-title">Admin Login</div>
              <div class="login-sub">Nuxchoco Dashboard</div>
              <input class="login-input" type="password" placeholder="Password..." id="passInput" style="${state.passErr ? 'border-color:#F44336;' : ''}" onkeydown="if(event.key==='Enter'){doLogin();}" value="${state.pass}"/>
              ${state.passErr ? '<div class="error-msg">Wrong password!</div>' : ''}
              <button class="login-btn" onclick="doLogin()">Login</button>
              <div class="login-hint">Password: nuxchoco2026</div>
            </div>
          </div>` : `
          <div class="admin-content">
            <div class="stats-cards">
              <div class="stat-card" style="border-left:3px solid #3B1F0A;"><div class="stat-card-icon">📦</div><div class="stat-card-value">${state.orders.length}</div><div class="stat-card-label">Total</div></div>
              <div class="stat-card" style="border-left:3px solid #C9933A;"><div class="stat-card-icon">🆕</div><div class="stat-card-value">${state.orders.filter(o=>o.status==="New").length}</div><div class="stat-card-label">New</div></div>
              <div class="stat-card" style="border-left:3px solid #4CAF50;"><div class="stat-card-icon">✅</div><div class="stat-card-value">${state.orders.filter(o=>o.status==="Delivered").length}</div><div class="stat-card-label">Delivered</div></div>
              <div class="stat-card" style="border-left:3px solid #9C27B0;"><div class="stat-card-icon">💰</div><div class="stat-card-value">₹${rev.toLocaleString()}</div><div class="stat-card-label">Revenue</div></div>
              <div class="stat-card" style="border-left:3px solid #2196F3;"><div class="stat-card-icon">⏳</div><div class="stat-card-value">${state.orders.filter(o=>["Confirmed","Packed"].includes(o.status)).length}</div><div class="stat-card-label">Pending</div></div>
            </div>
            <div class="filter-btns">
              ${["All","Wedding","Rakhi","Diwali","Corporate"].map(c => `
                <button class="filter-btn" style="background:${state.orderCatFilter===c?'#C9933A':'white'};color:${state.orderCatFilter===c?'white':'#5A3D1A'};" onclick="setState({orderCatFilter:'${c}'})">
                  ${{"Wedding":"💒 ","Rakhi":"🧡 ","Diwali":"🪔 ","Corporate":"🏢 ","All":"📦 "}[c]}${c}
                </button>`).join("")}
            </div>
            <div class="orders-table">
              <div class="orders-header"><h3>${state.orderCatFilter==="All"?"All Orders":state.orderCatFilter+" Orders"}</h3><span style="font-size:10px;color:#86868B;">${state.loading?"Loading...":fOrders.length+" orders"}</span></div>
              ${fOrders.length === 0 ? `<div class="empty-orders"><div style="font-size:40px;margin-bottom:8px;">📭</div><div style="font-size:13px;color:#86868B;">${state.loading?"Loading...":"Koi order nahi"}</div></div>` :
              fOrders.map((o,i) => `
                <div class="order-row" style="${i < fOrders.length-1 ? 'border-bottom:1px solid #F8F8F8;' : ''}">
                  <div>
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
                      <span class="order-name">${o.name}</span>
                      <span class="cat-tag">${o.category||""}</span>
                    </div>
                    <div class="order-meta">📱 ${o.phone}</div>
                    <div class="order-meta">📍 ${(o.address||"").slice(0,30)}</div>
                    ${o.note ? `<div style="font-size:10px;color:#C9933A;">💬 ${o.note}</div>` : ""}
                  </div>
                  <div>
                    <div class="order-item">${o.hamper_name}</div>
                    <div class="order-meta">Qty: ${o.quantity}</div>
                    <div class="order-price">₹${(o.total||0).toLocaleString()}</div>
                    <div style="font-size:9px;color:#CCC;">${new Date(o.created_at).toLocaleDateString("en-IN")}</div>
                  </div>
                  <select class="status-select" style="border-color:${STATUS_COLORS[o.status]||"#ccc"};color:${STATUS_COLORS[o.status]||"#ccc"};" onchange="updateStatus(${o.id}, this.value)">
                    ${Object.keys(STATUS_COLORS).map(s => `<option value="${s}" ${o.status===s?"selected":""}>${s}</option>`).join("")}
                  </select>
                  <button class="del-btn" onclick="deleteOrder(${o.id})">🗑️</button>
                </div>`).join("")}
            </div>
          </div>`}
      </div>`;
    return;
  }

              <span class="cart-item-emoji">${c.emoji}</span>
              <div class="cart-item-info">

            </div>`).join("")}

        ${state.cart.length > 0 ? `
          <div class="cart-footer">
            <div class="cart-total-row">

            <div class="form-group"><label class="form-label">Phone *</label><input class="form-input" placeholder="WhatsApp number" id="f_phone" value="${state.form.phone}" oninput="state.form.phone=this.value"/></div>
            <div class="form-group"><label class="form-label">Address *</label><input class="form-input" placeholder="Delivery address" id="f_addr" value="${state.form.addr}" oninput="state.form.addr=this.value"/></div>
            <div class="form-row">
              <div class="form-group"><label class="form-label">City</label><input class="form-input" placeholder="Mumbai" id="f_city" value="${state.form.city}" oninput="state.form.city=this.value"/></div>
              <div class="form-group"><label class="form-label">Note</label><input class="form-input" placeholder="Special request" id="f_note" value="${state.form.note}" oninput="state.form.note=this.value"/></div>
            </div>
            <button class="pay-btn" onclick="doRazorpay()" ${state.paying?"disabled":""}>
              ${state.paying ? "Processing..." : "Pay Rs." + cartTotal().toLocaleString() + " →"}
            </button>
          </div>` : ""}
      </div>
    </div>` : "";

    <section id="categories" style="background:#F5F5F7;">
      <div style="max-width:1200px;margin:0 auto;">
        <div class="section-label">Shop by Category</div>
        <div class="section-title" style="color:#100C04;">Hampers for Every Occasion</div>
        <div class="cats-grid">
          ${CATS.map(cat => `
            <div class="cat-card" style="background:${cat.bg};border:1px solid ${cat.color}15;" onclick="scrollTo('hampers')">
              <div class="cat-card-icon">${cat.icon}</div>
              <div class="cat-label" style="color:${cat.color};">${cat.label}</div>
              <h3>${cat.desc}</h3>
              <p>From Rs.${Math.min(...cat.items.map(h=>h.price)).toLocaleString()} · ${cat.items.length} hampers</p>
              <span class="cat-link" style="color:${cat.color};">Shop ${cat.label} →</span>
            </div>`).join("")}
        </div>
      </div>
    </section>

    <section id="hampers" style="background:white;">
      <div style="max-width:1200px;margin:0 auto;">
        <div class="section-label">Our Products</div>
        <div class="section-title" style="color:#100C04;">Every Gift, Perfectly Curated</div>
        <div class="filter-tabs">
          ${["All",...CATS.map(c=>c.label)].map(c => `
            <button class="filter-tab" style="background:${state.catFilter===c?'#100C04':'#F5F5F7'};color:${state.catFilter===c?'white':'#86868B'};" onclick="setState({catFilter:'${c}'})">${c}</button>`).join("")}
        </div>
        <div class="products-grid">
          ${ALL_ITEMS.filter(h => state.catFilter==="All" || h.cat===state.catFilter).map(h => `
            <div class="product-card">
              <div class="product-img" style="background:${h.catBg};">
                ${h.emoji}
                <span class="product-cat-tag" style="background:${h.catColor};">${h.cat}</span>
              </div>
              <div class="product-body">
                <h3>${h.name}</h3>
                <p>${h.desc}</p>
                <div class="price-row">
                  <span class="price">Rs.${h.price.toLocaleString()}</span>
                  <span class="price-old">Rs.${h.op}</span>
                  <span class="price-off">${Math.round((1-h.price/h.op)*100)}% OFF</span>
                </div>
                <button class="btn-add" onclick='addToCart(${JSON.stringify(h).replace(/'/g, "&#39;")})'>Add to Cart</button>
              </div>
            </div>`).join("")}
        </div>
      </div>
    </section>
