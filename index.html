            {[["categories","Categories"],["hampers","Hampers"],["contact","Contact"]].map(([id,l])=>(
              <button key={id} onClick={()=>go(id)}
                style={{background:"none",border:"none",color:GRAY2,fontSize:13,fontWeight:500,cursor:"pointer"}}>{l}</button>
            ))}
            <button onClick={()=>setShowCart(true)}
              style={{background:GRAY,color:DK,border:"none",padding:"8px 16px",fontSize:12,fontWeight:600,cursor:"pointer",borderRadius:980,position:"relative"}}>
              🛒 Cart {cartCount>0&&<span style={{background:G,color:W,borderRadius:"50%",fontSize:9,padding:"2px 5px",marginLeft:4}}>{cartCount}</span>}
            </button>
            <button onClick={()=>setShowCart(true)}
              style={{background:G,color:W,border:"none",padding:"8px 16px",fontSize:12,fontWeight:600,cursor:"pointer",borderRadius:980}}>
              Order Now
            </button>
          </div>
        </div>
      </nav>

      {/* HERO */}
      <section style={{background:B.bg,minHeight:"88vh",display:"flex",alignItems:"center",
        padding:"70px 6%",position:"relative",overflow:"hidden",transition:"background 0.8s"}}>
        <div style={{position:"absolute",top:"20%",right:"8%",width:400,height:400,
          background:`radial-gradient(circle,${B.ac}20 0%,transparent 70%)`,borderRadius:"50%",pointerEvents:"none"}}/>
        <div style={{maxWidth:1100,width:"100%",margin:"0 auto",display:"grid",gridTemplateColumns:"1fr 1fr",gap:70,alignItems:"center"}}>
          <div>
            <div style={{display:"inline-block",background:`${B.ac}25`,border:`1px solid ${B.ac}40`,borderRadius:20,padding:"4px 12px",marginBottom:18}}>
              <span style={{fontSize:10,color:B.ac,fontWeight:700,letterSpacing:1}}>{B.tag}</span>
            </div>
            <h1 style={{fontSize:"clamp(32px,5vw,58px)",color:"white",lineHeight:1.1,fontWeight:700,marginBottom:12,letterSpacing:-1,whiteSpace:"pre-line"}}>{B.sub}</h1>
            <p style={{fontSize:15,color:"rgba(255,255,255,0.5)",lineHeight:1.7,marginBottom:28}}>Premium Dryfruits · Imported Chocolates · Luxury Packaging</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>go("hampers")}
                style={{background:G,color:W,border:"none",padding:"12px 26px",fontSize:12,fontWeight:600,cursor:"pointer",borderRadius:980}}>Shop Now →</button>
              <button onClick={()=>go("categories")}
                style={{background:"transparent",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.4)",padding:"12px 26px",fontSize:12,fontWeight:600,cursor:"pointer",borderRadius:980}}>All Categories</button>
            </div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:130,lineHeight:1,filter:"drop-shadow(0 20px 40px rgba(0,0,0,0.3))"}}>{B.emoji}</div>
            <div style={{marginTop:16,background:`${B.ac}15`,border:`1px solid ${B.ac}30`,borderRadius:12,padding:"10px 16px",display:"inline-flex",alignItems:"center",gap:8}}>
              <div style={{width:22,height:22,borderRadius:4,background:`linear-gradient(135deg,${DK},${G})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>🍫</div>
              <span style={{fontSize:12,color:"white",fontWeight:600}}>Nuxchoco Hampers</span>
            </div>
          </div>
        </div>
        <div style={{position:"absolute",bottom:22,left:"50%",transform:"translateX(-50%)",display:"flex",gap:7}}>
          {[0,1,2,3].map(i=>(
            <button key={i} onClick={()=>{setBn(i);clearInterval(tr.current);}}
              style={{width:i===bn?22:6,height:6,borderRadius:3,border:"none",background:i===bn?"white":"rgba(255,255,255,0.3)",cursor:"pointer",transition:"all .3s",padding:0}}/>
          ))}
        </div>
      </section>

      {/* MARQUEE */}
      <div style={{background:G,padding:"10px 0",overflow:"hidden"}}>
        <div style={{display:"flex",whiteSpace:"nowrap"}}>
          {[0,1].map(k=>(
            <div key={k} style={{display:"flex",flexShrink:0}}>
              {["Wedding Hampers","Rakhi Special 2026","Diwali Gifts","Corporate Gifting","Pan India Delivery","Premium Dryfruits","Imported Chocolates","Custom Branding"].map((t,j)=>(
                <span key={j} style={{fontSize:10,fontWeight:600,letterSpacing:2.5,textTransform:"uppercase",color:"white",padding:"0 26px"}}>{t} <span style={{opacity:0.4}}>◆</span></span>
              ))}
            </div>
          ))}
        </div>
      </div>

      {/* CATEGORIES */}
      <section id="categories" style={{background:GRAY,padding:"80px 6%"}}>
        <div style={{maxWidth:1200,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:44}}>
            <div style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:G,marginBottom:10,fontWeight:600}}>Shop by Category</div>
            <h2 style={{fontSize:"clamp(22px,4vw,40px)",color:DK,fontWeight:700,letterSpacing:-1}}>Hampers for Every Occasion</h2>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            {CATS.map(cat=>(
              <div key={cat.id} style={{background:cat.bg,borderRadius:18,padding:"30px 26px",position:"relative",overflow:"hidden",cursor:"pointer",border:`1px solid ${cat.color}15`,transition:"transform .2s"}}
                onClick={()=>go("hampers")}
                onMouseEnter={e=>e.currentTarget.style.transform="scale(1.01)"}
                onMouseLeave={e=>e.currentTarget.style.transform="none"}>
                <div style={{position:"absolute",right:-15,top:-15,fontSize:100,opacity:0.1}}>{cat.icon}</div>
                <div style={{fontSize:10,letterSpacing:2.5,textTransform:"uppercase",color:cat.color,fontWeight:700,marginBottom:8}}>{cat.label}</div>
                <h3 style={{fontSize:20,color:DK,fontWeight:700,marginBottom:6,letterSpacing:-0.5}}>{cat.desc}</h3>
                <p style={{fontSize:12,color:GRAY2,marginBottom:16}}>From ₹{Math.min(...cat.items.map(h=>h.price)).toLocaleString()} · {cat.items.length} hampers</p>
                <span style={{fontSize:13,color:cat.color,fontWeight:600}}>Shop {cat.label} →</span>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* HAMPERS */}
      <section id="hampers" style={{background:W,padding:"80px 6%"}}>
        <div style={{maxWidth:1200,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:44}}>
            <div style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:G,marginBottom:10,fontWeight:600}}>Our Products</div>
            <h2 style={{fontSize:"clamp(22px,4vw,40px)",color:DK,fontWeight:700,letterSpacing:-1}}>Every Gift, Perfectly Curated</h2>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:32,flexWrap:"wrap"}}>
            {["All",...CATS.map(c=>c.label)].map(c=>(
              <button key={c} onClick={()=>setCatF(c)}
                style={{padding:"7px 16px",borderRadius:980,fontSize:12,fontWeight:600,cursor:"pointer",border:"none",background:catF===c?DK:GRAY,color:catF===c?W:GRAY2,transition:"all .2s"}}>{c}</button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>
            {ALL.filter(h=>catF==="All"||h.cat===catF).map(h=>(
              <div key={h.id} style={{background:W,borderRadius:14,overflow:"hidden",border:"1px solid #F0F0F0",boxShadow:"0 2px 14px rgba(0,0,0,0.05)",transition:"transform .2s,box-shadow .2s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 10px 28px rgba(0,0,0,0.09)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 14px rgba(0,0,0,0.05)";}}>
                <div style={{height:128,background:h.catBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:50,position:"relative"}}>
                  {h.emoji}
                  <span style={{position:"absolute",top:8,left:10,fontSize:8,padding:"3px 7px",borderRadius:6,background:h.catColor,color:W,fontWeight:700}}>{h.cat}</span>
                </div>
                <div style={{padding:"14px"}}>
                  <h3 style={{fontSize:14,color:DK,margin:"0 0 4px",fontWeight:700}}>{h.name}</h3>
                  <p style={{fontSize:11,color:GRAY2,lineHeight:1.6,marginBottom:10}}>{h.desc}</p>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12}}>
                    <span style={{fontSize:17,color:G,fontWeight:700}}>₹{h.price.toLocaleString()}</span>
                    <span style={{fontSize:11,color:GRAY2,textDecoration:"line-through"}}>₹{h.op}</span>
                    <span style={{fontSize:9,color:"#4CAF50",fontWeight:700,background:"#E8F5E9",padding:"2px 5px",borderRadius:5}}>{Math.round((1-h.price/h.op)*100)}% OFF</span>
                  </div>
                  <button onClick={()=>addToCart(h)}
                    style={{width:"100%",background:DK,color:W,border:"none",padding:"9px",fontSize:11,fontWeight:600,cursor:"pointer",borderRadius:8}}>
                    🛒 Add to Cart
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* STATS */}
      <section style={{background:DK,padding:"68px 6%"}}>
        <div style={{maxWidth:1000,margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:1,background:"rgba(255,255,255,0.04)"}}>
          {[["₹6.25L Cr","India Gifting 2024"],["₹14,000 Cr","Corporate Gifting"],["₹25,000 Cr","Chocolate Market"],["200M+","Rakhi Celebrators"],["90%","Gift Chocolates"]].map(([n,l],i)=>(
            <div key={i} style={{background:DK,padding:"30px 12px",textAlign:"center"}}>
              <div style={{fontSize:22,color:G,fontWeight:700}}>{n}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:6,lineHeight:1.5}}>{l}</div>
            </div>
          ))}
        </div>
      </section>

      {/* CONTACT */}
      <section id="contact" style={{background:W,padding:"80px 6%",textAlign:"center"}}>
        <div style={{maxWidth:520,margin:"0 auto"}}>
          <div style={{width:56,height:56,borderRadius:14,background:`linear-gradient(135deg,${DK},${G})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 20px"}}>🍫</div>
          <div style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:G,marginBottom:10,fontWeight:600}}>Get in Touch</div>
          <h2 style={{fontSize:"clamp(20px,3.5vw,36px)",color:DK,fontWeight:700,marginBottom:10,letterSpacing:-1}}>Ready to Gift Something Extraordinary?</h2>
          <p style={{fontSize:14,color:GRAY2,lineHeight:1.7,marginBottom:30}}>Whether 1 hamper or 5,000 — we make every moment unforgettable.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:28}}>
            {[["📱","WhatsApp","Order instantly"],["📸","Instagram","@nuxchocohampers"],["📦","Corporate","Bulk 50+ orders"]].map(([ic,t,d])=>(
              <div key={t} style={{background:GRAY,borderRadius:12,padding:"16px 10px",textAlign:"center"}}>
                <div style={{fontSize:22,marginBottom:6}}>{ic}</div>
                <div style={{fontSize:11,fontWeight:700,color:DK,marginBottom:2}}>{t}</div>
                <div style={{fontSize:10,color:GRAY2}}>{d}</div>
              </div>
            ))}
          </div>
          <button onClick={()=>setShowCart(true)}
            style={{background:G,color:W,border:"none",padding:"14px 36px",fontSize:12,fontWeight:700,cursor:"pointer",borderRadius:980}}>
            🎁 Order Now
          </button>
        </div>
      </section>

      {/* FOOTER */}
      <footer style={{background:DK,borderTop:"1px solid rgba(255,255,255,0.05)",padding:"30px 6%"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:26,marginBottom:22}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
              <div style={{width:24,height:24,borderRadius:4,background:`linear-gradient(135deg,${DK},${G})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🍫</div>
              <span style={{fontSize:13,color:W,fontWeight:700}}>Nuxchoco</span>
            </div>
            <p style={{fontSize:10,color:"rgba(255,255,255,0.3)",lineHeight:1.7}}>India Premium Dryfruit & Chocolate Hamper Brand</p>
          </div>
          {[{t:"Categories",l:["Wedding","Rakhi","Diwali","Corporate"]},
            {t:"Company",l:["About Us","Our Story","Contact"]},
            {t:"Support",l:["Track Order","Returns","FAQ"]}
          ].map(col=>(
            <div key={col.t}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:12,fontWeight:600}}>{col.t}</div>
              {col.l.map(l=><div key={l} style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginBottom:6,cursor:"pointer"}}>{l}</div>)}
            </div>
          ))}
        </div>
        <div style={{maxWidth:1200,margin:"0 auto",paddingTop:16,borderTop:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.18)"}}>© 2026 Nuxchoco Hampers · GST Registered · Made with ❤️ in India</div>
          <button onClick={()=>setPg("admin")} style={{background:"none",border:"none",fontSize:9,color:"rgba(255,255,255,0.15)",cursor:"pointer"}}>Admin</button>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
